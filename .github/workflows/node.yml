name: Node.js CI

on:
  push:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

        with:
          node-version: 20

      - name: Install Backend
        run: |
          cd backend
          npm install

      - name: Run Tests
        run: |
          cd backend
          npm test